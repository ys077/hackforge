# Development docker-compose override
version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      DEBUG: true
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      DEBUG: true
    volumes:
      - ./ml-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
